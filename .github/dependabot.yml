# ref: https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    rebase-strategy: "disabled"
    schedule:
      interval: "monthly"
    groups:
      github-actions-update:
        patterns:
          - "*"
    cooldown:
      default-days: 14
