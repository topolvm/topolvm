on:
  workflow_call:
    inputs:
      topolvm_version:
        description: "TopoLVM version"
        default: "devel"
        type: string
      image_tag:
        description: "Image tag"
        default: "latest"
        type: string
      image_prefix:
        description: "Image prefix"
        default: ""
        type: string
      push:
        description: "Push images"
        default: false
        type: boolean
      test:
        description: "Run container-structure-test"
        default: false
        type: boolean

jobs:
  build-images:
    name: "build-images"
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    steps:
      - name: Disk cleanup
        run: |
          # These code are copied from the following code:
          # https://github.com/shiguredo-webrtc-build/webrtc-build/blob/5a821e430b496bbff74cf45bab058ab4ac340c2c/.github/workflows/build.yml#L138-L147
          #    LICENSE: http://www.apache.org/licenses/LICENSE-2.0
          #    Copyright 2019-2025, Shiguredo Inc.
          df -h
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          df -h
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Configure Docker daemon if necessary
        # It is necessary to load multi-platform images to the local image store.
        # see https://docs.docker.com/engine/storage/containerd/
        run: |
          if ! docker info -f '{{ .DriverStatus }}' | grep -F 'io.containerd.snapshotter.v1'; then
            echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
            sudo systemctl restart docker
          fi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login registry
        if: ${{ inputs.push }}
        run: printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: make multi-platform-images
        env:
          TOPOLVM_VERSION: ${{ inputs.topolvm_version }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_PREFIX: ${{ inputs.image_prefix }}
          PUSH: ${{ inputs.push }}
      - name: Run container-structure-test
        if: ${{ inputs.test }}
        run: |
          make install-container-structure-test
          make container-structure-test STRUCTURE_TEST_TARGET=normal
          make container-structure-test STRUCTURE_TEST_TARGET=with-sidecar
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_PREFIX: ${{ inputs.image_prefix }}
