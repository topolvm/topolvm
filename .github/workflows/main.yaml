name: "Main"
on:
  pull_request:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:
    name: "build"
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: "go.mod"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - run: make setup
      - run: make check-uncommitted
      - run: make build-topolvm GOARCH=s390x
        name: "Build TopoLVM for s390x architecture"
      - run: make groupname-test
      # use sudo to test root required operations
      - run: sudo make test

  build-images:
    name: "build-images"
    uses: ./.github/workflows/build-images.yaml
    with:
      test: "true"

  example:
    if:  startsWith(github.head_ref, 'bump-chart-')
    name: "example"
    runs-on: "ubuntu-22.04"
    defaults:
      run:
        working-directory: "example"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: "go.mod"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - run: make setup
      - run: make run
