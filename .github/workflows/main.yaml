name: "Main"
on:
  pull_request:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:
    name: "build"
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: make setup
      - run: make check-uncommitted
      - run: make build-topolvm GOARCH=s390x
        name: "Build TopoLVM for s390x architecture"
      - run: make groupname-test
      # use sudo to test root required operations
      - run: sudo make test

  build-images:
    name: "build-images"
    uses: ./.github/workflows/build-images.yaml
    permissions:
      contents: read
      packages: write
    with:
      test: true

  example:
    if:  startsWith(github.head_ref, 'bump-chart-')
    name: "example"
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    timeout-minutes: 30
    defaults:
      run:
        working-directory: "example"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: make setup
      - run: make run
