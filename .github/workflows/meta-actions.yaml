name: meta

on:
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

jobs:
  actionlint:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - run: make run-actionlint

  ghalint:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - run: make run-ghalint
