name: "Release Charts"

on: "workflow_dispatch"

permissions:
  contents: write

jobs:
  release:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: "Configure Git"
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # This version is written in `charts/topolvm/README.md`,
      # so do not update it if not necessary.
      - name: "Install Helm"
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
        with:
          version: "v3.5.0"

      # Add depending repository for helm to avoid the error below.
      # `Error: no repository definition for https://charts.jetstack.io`
      # see: https://github.com/helm/chart-releaser-action/issues/74
      - name: "Add cert-manager repo for helm"
        run: |
          helm repo add cert-manager https://charts.jetstack.io

      - name: "Run chart-releaser"
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f
        with:
          config: .cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
