name: "Create chart update Pull Request"

on:
  workflow_dispatch:
    inputs:
      app-version:
        description: app version (e.g. 0.1.0)
        type: string
      chart-version:
        description: chart version (e.g. 0.1.0)
        type: string

permissions:
  contents: write

jobs:
  create-chart-update-pr:
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    steps:
      - name: "Validate input"
        run: |
          # The exit code will be 1 if the pattern is not found by grep.
          printf '%s\n' "$APP_VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
          printf '%s\n' "$CHART_VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
        env:
          APP_VERSION: ${{ inputs.app-version }}
          CHART_VERSION: ${{ inputs.chart-version }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          # ref. https://github.com/orgs/community/discussions/26560#discussioncomment-3252340
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: "Create a branch"
        run: |
            git switch main
            git pull
            git switch -c "bump-chart-${CHART_VERSION}"
        env:
          CHART_VERSION: ${{ inputs.chart-version }}
      - name: "Resolve image digest"
        id: image
        run: |
          digest=$(gh api --paginate "/orgs/topolvm/packages/container/topolvm-with-sidecar/versions" \
            --jq "[.[] | select(.metadata.container.tags[]? == \"${APP_VERSION}\") | .name] | first")
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::Could not find a digest for tag ${APP_VERSION} in ghcr.io/topolvm/topolvm-with-sidecar" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ inputs.app-version }}
      - name: "Update files"
        run: |
          sed -r -i "s/checkout topolvm-chart-v[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/checkout topolvm-chart-v${CHART_VERSION}/g" example/README.md
          sed -r -i "s/appVersion: [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/appVersion: ${APP_VERSION}/g" charts/topolvm/Chart.yaml
          sed -r -i "s/^version: [[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/version: ${CHART_VERSION}/g" charts/topolvm/Chart.yaml
          sed -r -i "s/ghcr.io\/topolvm\/topolvm-with-sidecar:[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/ghcr.io\/topolvm\/topolvm-with-sidecar:${APP_VERSION}/g" charts/topolvm/Chart.yaml
          sed -r -i "s/ghcr.io\/topolvm\/topolvm:[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+/ghcr.io\/topolvm\/topolvm:${APP_VERSION}/g" charts/topolvm/Chart.yaml
          sed -r -i "s/^(  reference:).*/\1 ${APP_VERSION}@${IMAGE_DIGEST}/" charts/topolvm/values.yaml
          make install-helm-docs && make generate-helm-docs
        env:
          APP_VERSION: ${{ inputs.app-version }}
          CHART_VERSION: ${{ inputs.chart-version }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
      - name: Issue an access token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.PROJECT_APP_ID }}
          private-key: ${{ secrets.PROJECT_APP_PEM }}
          permission-pull-requests: write
      - name: "Create pull request"
        run: |
          git commit -a -s -m "Bump chart version to ${CHART_VERSION}"
          git push --set-upstream origin "bump-chart-${CHART_VERSION}"
          gh pr create --draft --fill
        env:
          CHART_VERSION: ${{ inputs.chart-version }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
